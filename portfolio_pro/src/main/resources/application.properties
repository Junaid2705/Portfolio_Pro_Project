# =====================================================
# FILE: src/main/resources/application.properties
# Replace EVERYTHING in this file with the lines below
# =====================================================

# Database \u2014 change YOUR_PASSWORD to your MySQL password
spring.datasource.url=jdbc:mysql://localhost:3306/portfolio_pro
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA \u2014 'validate' checks DB matches your entities, won't drop tables
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JWT
app.jwt.secret=PortfolioPro2024SuperSecretKeyChangeInProd!@#$%
app.jwt.expiration-ms=86400000

# File upload limit
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Server port
server.port=8080
